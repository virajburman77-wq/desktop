name: Vibe Browser Build

on:
  workflow_dispatch:
    inputs:
      update_branch:
        description: "Release branch"
        default: "release"
        type: choice
        options: [release, dev]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      ZEN_RELEASE: 1
      SURFER_COMPAT: x86_64
      ZEN_GA_DISABLE_PGO: true
      ZEN_RELEASE_BRANCH: release
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      SURFER_PLATFORM: linux
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip yasm nasm build-essential \
            libgtk2.0-dev libpython3-dev m4 uuid libasound2-dev libcurl4-openssl-dev \
            libdbus-1-dev libdrm-dev libdbus-glib-1-dev libgtk-3-dev libpulse-dev \
            libx11-xcb-dev libxt-dev lld llvm clang libclang-dev \
            libc6-dev libstdc++-12-dev dos2unix xvfb

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install npm deps
        run: npm ci

      - name: Setup Surfer
        run: npm run surfer -- ci --brand ${{ inputs.update_branch }} --display-version "1.0.0"

      - name: Download Firefox engine
        run: npm run download

      - name: Import patches
        env:
          SURFER_CERT_PATCH_ISSUER: ${{ secrets.SURFER_CERT_PATCH_ISSUER }}
          SURFER_CERT_PATCH_NAME: ${{ secrets.SURFER_CERT_PATCH_NAME }}
        run: npm run import

      - name: Build language packs
        run: sh scripts/download-language-packs.sh

      - name: Fix Rust version
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain $(cat .rust-toolchain)
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add x86_64-unknown-linux-gnu

      - name: Bootstrap
        run: |
          cd engine
          ./mach --no-interactive bootstrap --application-choice browser
          cd ..

      - name: Install cbindgen
        run: cargo install cbindgen --locked

      - name: Build
        env:
          ZEN_SAFEBROWSING_API_KEY: ${{ secrets.ZEN_SAFEBROWSING_API_KEY }}
          ZEN_MOZILLA_API_KEY: ${{ secrets.ZEN_MOZILLA_API_KEY }}
          ZEN_GOOGLE_LOCATION_SERVICE_API_KEY: ${{ secrets.ZEN_GOOGLE_LOCATION_SERVICE_API_KEY }}
        run: npm run build

      - name: Package installer
        run: npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibe-browser-build
          path: dist/
