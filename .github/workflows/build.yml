name: Vibe Browser Build

on:
  workflow_dispatch:
    inputs:
      update_branch:
        description: "Release branch"
        default: "release"
        type: choice
        options: [release, dev]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip yasm nasm build-essential \
            libgtk2.0-dev libpython3-dev m4 uuid libasound2-dev libcurl4-openssl-dev \
            libdbus-1-dev libdrm-dev libdbus-glib-1-dev libgtk-3-dev libpulse-dev \
            libx11-xcb-dev libxt-dev lld llvm

      - name: Install npm deps
        run: npm ci

      - name: Setup Surfer
        run: npm run surfer -- ci --brand ${{ inputs.update_branch }}

      - name: Download Firefox engine
        run: npm run download

      - name: Import patches
        run: npm run import

      - name: Build language packs
        run: sh scripts/download-language-packs.sh

      - name: Fix Rust version
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain $(cat .rust-toolchain)
          source $HOME/.cargo/env

      - name: Bootstrap build
        run: npm run bootstrap

      - name: Install cbindgen
        run: source $HOME/.cargo/env && cargo install cbindgen --locked

      - name: Build
        run: npm run build

      - name: Package installer
        run: npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibe-browser-build
          path: dist/
